# LOCK-WAIT SAFETY NET: MySQL's default innodb_lock_wait_timeout is 50s.
# We hit real production failures where a secondary write (e.g. the audit
# log insert after creating a user) got stuck behind an unrelated open
# transaction's row lock for the full 50s — far longer than the frontend's
# 30s HTTP timeout, so the UI reported "failed" even though the primary
# operation (e.g. user creation) had already committed successfully.
# Capping this per-session to 8s means any blocked statement fails fast
# and predictably, well within the frontend's timeout window, instead of
# silently stalling the whole request.
spring.datasource.hikari.connection-init-sql=SET SESSION innodb_lock_wait_timeout=8

# Disable Spring Boot SQL file initializer — DataInitializer.java handles seeding
spring.sql.init.mode=never

